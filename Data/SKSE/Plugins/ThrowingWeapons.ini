[Controls]
; Dispositivo del botón de apuntar/lanzar/recuperar el arma.
; Valores admitidos: Keyboard, Mouse, Gamepad.
AimDevice = Keyboard

; Código del botón dentro del dispositivo elegido.
;   - Keyboard: scan code de DirectInput (por defecto 19 = tecla R).
;   - Mouse: 0 = botón izquierdo, 1 = botón derecho, 2 = botón central,
;     3-7 = botones extra del ratón.
;   - Gamepad: código de botón estándar de SKSE para mando.
AimKeyCode = 34
