[Controls]
; Dispositivo del botón de apuntar/lanzar/recuperar el arma.
; Valores admitidos: Keyboard, Mouse, Gamepad.
AimDevice = Keyboard

; Código del botón dentro del dispositivo elegido.
;   - Keyboard: scan code de DirectInput (por defecto 19 = tecla R).
;   - Mouse: 0 = botón izquierdo, 1 = botón derecho, 2 = botón central,
;     3-7 = botones extra del ratón.
;   - Gamepad: código de botón estándar de SKSE para mando.
AimKeyCode = 34

[Damage]
; Cómo se calcula el daño del golpe inicial y del goteo eléctrico
; continuo mientras el arma sigue clavada en un actor (punto 6 de
; Mecanica del arma.txt).
; Valores admitidos:
;   - Direct: valores fijos (HitDamage/DotDamage).
;   - Level: escala con el nivel del atacante (LevelHitBase/PerLevel,
;     LevelDotBase/PerLevel) — a niveles bajos hace poco daño, más a
;     medida que sube.
Mode = Direct

; Modo Direct: daño del golpe inicial y de cada tick del goteo continuo.
HitDamage = 25.0
DotDamage = 6.0

; Modo Level: daño = Base + PerLevel * nivel del atacante.
LevelHitBase = 5.0
LevelHitPerLevel = 1.5
LevelDotBase = 1.0
LevelDotPerLevel = 0.3
